<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testing Investment &amp; Quality Improvement</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 24px; background: #fff; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    .chart-container { position: relative; height: 400px; max-width: 1000px; }
    .summary { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 24px; }
    .summary-box { padding: 12px 20px; border-radius: 8px; font-weight: 600; font-size: 1rem; }
    .summary-box.blue { background: #e3f2fd; color: #1565c0; }
    .summary-box.purple { background: #f3e5f5; color: #7b1fa2; }
    .summary-box.orange { background: #fff3e0; color: #e65100; }
    .summary-box.green { background: #e8f5e9; color: #2e7d32; }
  </style>
</head>
<body>
  <h1>Testing Investment &amp; Quality Improvement</h1>
  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>
  <div class="summary">
    <div class="summary-box blue">2022 TEST CASES TODAY</div>
    <div class="summary-box orange">149 TOTAL DEFECTS FOUND</div>
    <div class="summary-box green">18 ACTIVE DEFECTS NOW</div>
  </div>
  <script>
    const ctx = document.getElementById('chart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ["10/1","10/15","10/29","11/12","11/26","12/3","12/10","12/24","12/31","1/7","1/21","1/28","2/4","2/18","3/4","3/18","3/25"],
        datasets: [
          { label: 'Defects Logged', data: [0,1,0,3,11,10,11,0,0,10,7,8,22,5,2,5,null], borderColor: '#d32f2f', backgroundColor: 'rgba(211, 47, 47, 0.2)', fill: true, tension: 0.3, yAxisID: 'y' },
          { label: 'Open Defects', data: [5,5,8,9,15,27,35,31,31,35,23,21,20,21,15,19,null], borderColor: '#ff9800', borderDash: [5, 5], fill: false, tension: 0.3, yAxisID: 'y' },
          { label: 'Test Cases (unique names)', data: [0,0,0,0,0,1586,1586,1586,1586,1586,1915,2022,2022,2022,2022,2022,null], borderColor: '#1976d2', fill: false, tension: 0.3, yAxisID: 'y1' }
          ,
          { label: 'Predicted', data: [null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,19,6], borderColor: '#9e9e9e', borderDash: [4, 4], fill: false, tension: 0.3, yAxisID: 'y', pointRadius: 0 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { annotation: { annotations: { uatBox: { type: 'box', xMin: "11/12", xMax: "3/18", xScaleID: 'x', yMin: 38.949999999999996, yMax: 41, yScaleID: 'y', backgroundColor: 'rgba(66, 133, 244, 0.15)', borderColor: 'rgba(66, 133, 244, 0.4)', borderWidth: 1, borderDash: [6, 4], drawTime: 'beforeDatasetsDraw', z: -1, label: { display: true, content: 'UAT', position: 'start', font: { size: 10, weight: 'normal' } } }, uatStart: { type: 'line', xMin: "11/12", xMax: "11/12", xScaleID: 'x', yMin: 0, yMax: 41, yScaleID: 'y', borderColor: 'rgba(0, 137, 123, 0.9)', borderWidth: 3, borderDash: [8, 4], label: { display: true, content: 'UAT start', position: 'end', yAdjust: -4, font: { size: 8, weight: 'normal' }, backgroundColor: 'rgba(0, 137, 123, 0.9)' } }, predictionBox: { type: 'box', xMin: "3/18", xMax: "3/25", xScaleID: 'x', yMin: 38.949999999999996, yMax: 41, yScaleID: 'y', backgroundColor: 'rgba(158, 158, 158, 0.08)', borderColor: 'rgba(158, 158, 158, 0.3)', borderWidth: 1, borderDash: [4, 4], drawTime: 'beforeDatasetsDraw', z: -1, label: { display: true, content: 'Prediction', position: 'start', font: { size: 10, weight: 'normal' }, color: '#757575' } }, period1Start: { type: 'line', xMin: "12/3", xMax: "12/3", xScaleID: 'x', yMin: 0, yMax: 38.949999999999996, yScaleID: 'y', borderColor: 'rgba(76, 175, 80, 0.8)', borderWidth: 2, borderDash: [4, 4], label: { display: true, content: 'start', position: 'end' } }, period1End: { type: 'line', xMin: "12/10", xMax: "12/10", xScaleID: 'x', yMin: 0, yMax: 38.949999999999996, yScaleID: 'y', borderColor: 'rgba(244, 67, 54, 0.8)', borderWidth: 2, borderDash: [4, 4], label: { display: true, content: 'end', position: 'end' } }, period2Start: { type: 'line', xMin: "12/31", xMax: "12/31", xScaleID: 'x', yMin: 0, yMax: 38.949999999999996, yScaleID: 'y', borderColor: 'rgba(33, 150, 243, 0.8)', borderWidth: 2, borderDash: [4, 4], label: { display: true, content: 'start', position: 'end' } }, period2End: { type: 'line', xMin: "1/7", xMax: "1/7", xScaleID: 'x', yMin: 0, yMax: 38.949999999999996, yScaleID: 'y', borderColor: 'rgba(255, 152, 0, 0.8)', borderWidth: 2, borderDash: [4, 4], label: { display: true, content: 'end', position: 'end' } }, period3Start: { type: 'line', xMin: "1/28", xMax: "1/28", xScaleID: 'x', yMin: 0, yMax: 38.949999999999996, yScaleID: 'y', borderColor: 'rgba(156, 39, 176, 0.8)', borderWidth: 2, borderDash: [4, 4], label: { display: true, content: 'start', position: 'end' } }, period3End: { type: 'line', xMin: "2/4", xMax: "2/4", xScaleID: 'x', yMin: 0, yMax: 38.949999999999996, yScaleID: 'y', borderColor: 'rgba(0, 188, 212, 0.8)', borderWidth: 2, borderDash: [4, 4], label: { display: true, content: 'end', position: 'end' } }, period4Start: { type: 'line', xMin: "2/18", xMax: "2/18", xScaleID: 'x', yMin: 0, yMax: 38.949999999999996, yScaleID: 'y', borderColor: 'rgba(76, 175, 80, 0.8)', borderWidth: 2, borderDash: [4, 4], label: { display: true, content: 'start', position: 'end' } }, period4End: { type: 'line', xMin: "3/4", xMax: "3/4", xScaleID: 'x', yMin: 0, yMax: 38.949999999999996, yScaleID: 'y', borderColor: 'rgba(244, 67, 54, 0.8)', borderWidth: 2, borderDash: [4, 4], label: { display: true, content: 'end', position: 'end' } } } }, legend: { position: 'top' }, tooltip: { mode: 'index', intersect: false } },
        scales: {
          y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Defects' }, min: 0, max: 41 },
          y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Test Cases', align: 'end' }, min: 0, max: 2326, grid: { drawOnChartArea: false }, ticks: { callback: function(v) { return (v === 500 || v === 1000 || v === 1500) ? '' : v; } } }
        }
      }
    });
  </script>
</body>
</html>
